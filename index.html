<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arbeitszeit-Assistent Pro v18.6</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2693/2693507.png">
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --accent: #fbbf24; 
            --danger: #ef4444; --text: #ffffff; --success: #10b981; 
            --overtime: #f59e0b; /* Orange für Überstunden */
            --weekA: #2563eb; --weekB: #9333ea; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { width: 100%; max-width: 420px; box-sizing: border-box; }
        .app-header { width: 100%; text-align: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(56, 189, 248, 0.2); position: relative; }
        .app-header h1 { font-size: 1.3rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); margin: 0; }
        .help-container { position: absolute; right: 0; top: 0; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .help-label { font-size: 0.7rem; color: var(--primary); font-weight: bold; opacity: 0.8; }
        .help-trigger { background: var(--primary); color: var(--bg); width: 22px; height: 22px; border-radius: 50%; font-weight: bold; font-size: 0.85rem; border: none; display: flex; align-items: center; justify-content: center; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.4); text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .next-info { background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 18px; padding: 15px; text-align: left; margin-bottom: 12px; border-left: 5px solid var(--primary); }
        .timer-display { font-size: 2.6rem; font-weight: 800; margin: 5px 0; color: var(--text); font-variant-numeric: tabular-nums; }
        .btn { border: none; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; margin-bottom: 10px; cursor: pointer; color: white; transition: 0.2s; font-size: 1rem; }
        .btn-start { background: var(--success) !important; }
        .btn-stop { background: var(--danger) !important; }
        .btn-setup { background: #475569; }
        .btn-refresh { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
        .btn-vz { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid var(--danger); }
        .btn-extra { background: rgba(56, 189, 248, 0.15); color: var(--primary); border: 1px solid var(--primary); }
        .btn-confirm { background: var(--accent) !important; color: var(--bg) !important; animation: pulse-confirm 0.5s infinite; }
        .btn-vz.active { background: #f59e0b !important; color: white; animation: pulse 2s infinite; }
        .btn-extra.active { background: #6366f1 !important; color: white; animation: pulse 2s infinite; }
        @keyframes pulse-confirm { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: #94a3b8; margin-bottom: 4px; font-weight: 600; }
        .progress-bar { height: 10px; background: #020617; border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
        .progress-fill { height: 100%; width: 0%; transition: width 0.5s; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; }
        .modal-content { background: var(--card); min-height: 100vh; padding: 70px 20px 40px 20px; box-sizing: border-box; }
        .modal-nav { position: fixed; top: 0; left: 0; right: 0; background: var(--card); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--primary); z-index: 1001; }
        .accordion-btn { background: #334155; color: white; padding: 15px; width: 100%; text-align: left; border: none; border-radius: 12px; margin-top: 10px; font-weight: bold; display: flex; justify-content: space-between; cursor: pointer; }
        .accordion-content { display: none; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 0 0 12px 12px; margin-bottom: 10px; }
        .manual-box { background: rgba(56, 189, 248, 0.05); border: 1px solid var(--primary); padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: left; }
        input, select { background: #0f172a; border: 1px solid var(--primary); color: white; padding: 12px; border-radius: 10px; width: 100%; margin: 5px 0 12px 0; box-sizing: border-box; font-size: 1rem; }
        label { font-size: 0.7rem; color: var(--primary); font-weight: bold; text-transform: uppercase; }
        .log-entry { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.8rem; display: flex; justify-content: space-between; color: #94a3b8; }
        .footer-info { margin-top: 25px; font-size: 0.65rem; color: #475569; text-align: center; width: 100%; letter-spacing: 1px; }
        .help-text { text-align: left; font-size: 0.85rem; line-height: 1.5; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="container">
    <header class="app-header">
        <h1>Zeiterfassung</h1>
        <div class="help-container" onclick="openHelp()">
            <span class="help-label">Hilfe</span>
            <button class="help-trigger">?</button>
        </div>
    </header>

    <div style="display:flex; justify-content:space-between; width:100%; font-size:0.9rem; margin-bottom:10px; font-weight:bold; color:var(--primary);">
        <span id="live-clock">--:--:--</span>
        <span id="live-date">--.--.----</span>
    </div>

    <div class="next-info" id="task-card">
        <div style="font-size: 0.65rem; color: var(--accent); font-weight: 800; text-transform: uppercase;" id="task-status">Bereit</div>
        <div style="font-size: 1.1rem; font-weight: 700;" id="task-title">Dienst Starten?</div>
        <div style="font-size: 0.8rem; color: #cbd5e1;" id="task-details">Guten Tag!</div>
    </div>

    <div class="card">
        <div id="display-name" style="font-size: 0.8rem; color: var(--accent); font-weight: bold; margin-bottom: 8px;">LEHRKRAFT</div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <button id="week-btn" style="border:none; padding:8px 18px; border-radius:10px; color:white; font-weight:bold; cursor:pointer;" onclick="toggleWeekManual()">Woche <span id="week-label">A</span></button>
            <div style="font-size: 0.8rem; font-weight: bold; color: #94a3b8;">Ziel: <span id="soll-info" style="color:white;">26</span> Std</div>
        </div>
        <div id="main-timer" class="timer-display">00:00:00</div>
        <button id="btn-main" class="btn btn-start" onclick="toggleMain()">Dienst starten</button>
        <button id="btn-vz" class="btn btn-vz" onclick="handleVZClick()">Vertretung</button>
        <button id="btn-extra" class="btn btn-extra" onclick="handleExtraClick()">Konferenz / Termin</button>
        
        <div class="progress-container" style="margin-top: 20px;">
            <div class="progress-label"><span>Tag Fortschritt</span><span id="day-percent">0%</span></div>
            <div class="progress-bar"><div id="day-progress" class="progress-fill" style="background: var(--accent);"></div></div>
            <div class="progress-label"><span>Vertretungen (Monat)</span><span id="vz-val">0</span></div>
            <div class="progress-bar"><div id="vz-progress" class="progress-fill" style="background: var(--danger);"></div></div>
            <div class="progress-label"><span>Woche Gesamt (Soll: <span id="soll-label">26</span>h)</span><span id="week-percent">0%</span></div>
            <div class="progress-bar"><div id="week-progress" class="progress-fill" style="background: var(--success);"></div></div>
        </div>
    </div>

    <div id="log-container"></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top: 15px;">
        <button class="btn btn-setup" onclick="openSetup()">⚙️ Einstellungen</button>
        <button class="btn btn-refresh" onclick="location.reload()">🔄 Aktualisierung</button>
    </div>
    <footer class="footer-info">&copy; 2026 Michael Nagel &bull; v18.6</footer>
</div>

<div id="modal"><div class="modal-content" id="modal-body"></div></div>

<script>
    let db = JSON.parse(localStorage.getItem('lehrerDB_Export')) || [];
    let plan = JSON.parse(localStorage.getItem('lehrerPlanV13')) || {};
    let session = JSON.parse(localStorage.getItem('activeSessionV13')) || { active: false };
    let vzSession = JSON.parse(localStorage.getItem('vzSessionV13')) || { active: false };
    let extraSession = JSON.parse(localStorage.getItem('extraSessionV13')) || { active: false };
    let logs = JSON.parse(localStorage.getItem('dailyLogsV13')) || [];
    let currentWeek = localStorage.getItem('manualWeekV13') || 'A';
    let weeklySollHours = parseFloat(localStorage.getItem('weeklySollV13')) || 26;
    let userName = localStorage.getItem('userNameV13') || 'Lehrkraft';
    let confirmVZ = false, confirmExtra = false;

    const blocks = [
        { id: 'f1', label: 'Frühaufsicht', start: '07:10', end: '07:30' },
        { id: 'b1', label: '1. Block', start: '07:30', end: '09:00' },
        { id: 'a1', label: '1. Aufsicht', start: '09:00', end: '09:30' },
        { id: 'b2', label: '2. Block', start: '09:30', end: '11:00' },
        { id: 'a2', label: '2. Aufsicht', start: '11:00', end: '11:30' },
        { id: 'b3', label: '3. Block', start: '11:30', end: '13:00' },
        { id: 'a3', label: '3. Aufsicht', start: '13:00', end: '13:45' },
        { id: 'b4', label: '4. Block', start: '13:45', end: '15:15' },
        { id: 's1', label: 'Spätaufsicht', start: '15:15', end: '15:30' }
    ];

    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString();
        document.getElementById('live-date').innerText = now.toLocaleDateString();
        const todayStr = now.toDateString();
        if(localStorage.getItem('logDateV13') !== todayStr) {
            logs = []; localStorage.setItem('dailyLogsV13', JSON.stringify(logs)); localStorage.setItem('logDateV13', todayStr);
            renderLogs();
        }
        if (session.active) updateAssistant();
        updateUI(); 
    }, 1000);

    function formatTime(ms) {
        if (ms < 0) ms = 0;
        return new Date(ms).toISOString().substr(11, 8);
    }

    function toggleMain() {
        if (!session.active) {
            session = { active: true, start: Date.now() };
            localStorage.setItem('activeSessionV13', JSON.stringify(session));
            addLog("Dienststart");
        } else {
            if(confirm("Dienst beenden?")) {
                saveToDB('Hauptdienst', session.start, Date.now());
                session.active = false; localStorage.removeItem('activeSessionV13');
                addLog("Feierabend");
            }
        }
    }

    function handleVZClick() {
        if(vzSession.active) {
            if(confirm("Vertretung beenden?")) {
                saveToDB('Vertretung (VZ)', vzSession.start, Date.now());
                vzSession = { active: false }; localStorage.removeItem('vzSessionV13');
                addLog("VZ Ende");
            }
        } else {
            if(!confirmVZ) {
                confirmVZ = true; const btn = document.getElementById('btn-vz');
                btn.innerText = "Sicher? (Tippen)"; btn.classList.add('btn-confirm');
                setTimeout(() => { confirmVZ = false; updateUI(); }, 3000);
            } else {
                vzSession = { active: true, start: Date.now() };
                localStorage.setItem('vzSessionV13', JSON.stringify(vzSession));
                addLog("VZ Start"); confirmVZ = false; updateUI();
            }
        }
    }

    function handleExtraClick() {
        if(extraSession.active) {
            if(confirm("Konferenz beenden?")) {
                saveToDB('Konferenz', extraSession.start, Date.now());
                extraSession = { active: false }; localStorage.removeItem('extraSessionV13');
                addLog("Konferenz Ende");
            }
        } else {
            if(!confirmExtra) {
                confirmExtra = true; const btn = document.getElementById('btn-extra');
                btn.innerText = "Sicher? (Tippen)"; btn.classList.add('btn-confirm');
                setTimeout(() => { confirmExtra = false; updateUI(); }, 3000);
            } else {
                extraSession = { active: true, start: Date.now() };
                localStorage.setItem('extraSessionV13', JSON.stringify(extraSession));
                addLog("Konf. Start"); confirmExtra = false; updateUI();
            }
        }
    }

    function saveToDB(typ, start, end, manualDatum = null) {
        let datumStr = manualDatum || new Date().toLocaleDateString('de-DE');
        let diff = Math.abs(end - start);
        db.push({
            datum: datumStr, typ: typ,
            start: new Date(start).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}),
            ende: new Date(end).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}),
            dauer: new Date(diff).toISOString().substr(11, 8),
            ms: diff, isVZ: (typ.includes('VZ') ? 'JA' : 'NEIN')
        });
        localStorage.setItem('lehrerDB_Export', JSON.stringify(db));
    }

    function updateUI() {
        const btnMain = document.getElementById('btn-main');
        if(session.active) {
            document.getElementById('main-timer').innerText = formatTime(Date.now() - session.start);
            btnMain.innerText = "Dienst beenden"; btnMain.className = "btn btn-stop";
        } else {
            document.getElementById('main-timer').innerText = "00:00:00";
            btnMain.innerText = "Dienst starten"; btnMain.className = "btn btn-start";
        }

        const vzBtn = document.getElementById('btn-vz');
        if(vzSession.active) {
            vzBtn.innerText = `VZ läuft (${formatTime(Date.now() - vzSession.start)})`;
            vzBtn.classList.add('active'); vzBtn.classList.remove('btn-confirm');
        } else if(!confirmVZ) { vzBtn.innerText = "Vertretung"; vzBtn.classList.remove('active', 'btn-confirm'); }

        const exBtn = document.getElementById('btn-extra');
        if(extraSession.active) {
            exBtn.innerText = `Konf läuft (${formatTime(Date.now() - extraSession.start)})`;
            exBtn.classList.add('active'); exBtn.classList.remove('btn-confirm');
        } else if(!confirmExtra) { exBtn.innerText = "Konferenz / Termin"; exBtn.classList.remove('active', 'btn-confirm'); }

        const now = new Date();
        const vzCount = db.filter(e => {
            const parts = e.datum.split('.');
            return parseInt(parts[1]) === (now.getMonth() + 1) && parseInt(parts[2]) === now.getFullYear() && e.isVZ === 'JA';
        }).length;
        document.getElementById('vz-val').innerText = vzCount;
        document.getElementById('vz-progress').style.width = Math.min((vzCount / 4) * 100, 100) + "%";

        // WOCHENZEL LOGIK (NEU v18.6)
        function getMonday(d) {
            d = new Date(d); var day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6:1);
            return new Date(d.setDate(diff)).setHours(0,0,0,0);
        }
        const monday = getMonday(now);
        let weekMS = db.filter(e => {
            const parts = e.datum.split('.');
            return new Date(parts[2], parts[1]-1, parts[0]).getTime() >= monday;
        }).reduce((acc, curr) => acc + (curr.ms || 0), 0);
        
        if(session.active) weekMS += (Date.now() - session.start);
        if(vzSession.active) weekMS += (Date.now() - vzSession.start);
        if(extraSession.active) weekMS += (Date.now() - extraSession.start);

        const targetMS = weeklySollHours * 3600000;
        const weekPerc = Math.round((weekMS / targetMS) * 100);
        const weekBar = document.getElementById('week-progress');
        
        document.getElementById('week-percent').innerText = weekPerc + "%";
        document.getElementById('soll-label').innerText = weeklySollHours;
        
        if (weekPerc >= 100) {
            weekBar.style.width = "100%";
            weekBar.style.background = "var(--overtime)";
        } else {
            weekBar.style.width = weekPerc + "%";
            weekBar.style.background = "var(--success)";
        }

        const dayKey = `${currentWeek}-${['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'][now.getDay()]}`;
        let firstStart = 1440, lastEnd = 0, hasPlan = false;
        blocks.forEach(b => {
           if(plan[dayKey] && plan[dayKey][b.id] && plan[dayKey][b.id].trim() !== "") {
               hasPlan = true;
               const [sh, sm] = b.start.split(':').map(Number);
               const [eh, em] = b.end.split(':').map(Number);
               firstStart = Math.min(firstStart, sh * 60 + sm);
               lastEnd = Math.max(lastEnd, eh * 60 + em);
           }
        });
        if(session.active && hasPlan) {
            const elapsed = Math.max(0, (now.getHours()*60 + now.getMinutes()) - firstStart);
            const total = lastEnd - firstStart;
            const dayPerc = Math.min((elapsed / total) * 100, 100);
            document.getElementById('day-percent').innerText = Math.round(dayPerc) + "%";
            document.getElementById('day-progress').style.width = dayPerc + "%";
        }

        document.getElementById('week-label').innerText = currentWeek;
        document.getElementById('week-btn').style.background = currentWeek === 'A' ? 'var(--weekA)' : 'var(--weekB)';
        document.getElementById('display-name').innerText = userName.toUpperCase();
        document.getElementById('soll-info').innerText = weeklySollHours;
        renderLogs();
    }

    function openSetup() {
        let dateOptions = "";
        let d = new Date();
        for(let i=0; i<7; i++) {
            if(d.getDay() !== 0 && d.getDay() !== 6) {
                let ds = d.toLocaleDateString('de-DE');
                dateOptions += `<option value="${ds}">${i===0?'Heute':ds}</option>`;
            }
            d.setDate(d.getDate()-1);
        }
        let html = `
            <div class="modal-nav">
                <button onclick="document.getElementById('modal').style.display='none'" style="background:none; border:none; color:var(--danger); font-weight:bold; cursor:pointer;">✕ ABBRUCH</button>
                <b style="color:var(--primary)">EINSTELLUNGEN</b>
                <button onclick="saveSetup()" style="background:none; border:none; color:var(--success); font-weight:bold; cursor:pointer;">SPEICHERN ✓</button>
            </div>
            <div class="manual-box" style="border-color:var(--danger); background:rgba(239, 68, 68, 0.05); margin-top:20px;">
                <label style="color:var(--danger)">⚠️ RESET</label>
                <button class="btn btn-stop" style="font-size:0.8rem; padding:8px;" onclick="resetToday()">HEUTIGEN TAG AUF NULL SETZEN</button>
            </div>
            <div class="manual-box">
                <label style="color:var(--accent)">🕒 NACHTRAG (Mo-Fr)</label>
                <select id="nachtrag-date">${dateOptions}</select>
                <select id="nachtrag-cat"><option value="Hauptdienst">Hauptdienst</option><option value="Konferenz">Konferenz</option><option value="Vertretung (VZ)">Vertretung (VZ)</option></select>
                <div style="display:flex; gap:10px;"><input type="time" id="nachtrag-start" value="08:00"><input type="time" id="nachtrag-end" value="13:00"></div>
                <button class="btn btn-start" style="padding:10px; font-size:0.85rem;" onclick="processManual()">SPEICHERN</button>
            </div>
            <label>NAME</label><input type="text" id="setup-name" value="${userName}">
            <label>WOCHEN-SOLL</label><input type="number" id="setup-soll" value="${weeklySollHours}">
            <button class="accordion-btn" onclick="toggleAcc('accA')">WOCHE A BEARBEITEN <span>▼</span></button>
            <div id="accA" class="accordion-content">`;
        ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag'].forEach(tag => {
            html += `<div style="margin-top:15px; border-bottom:1px solid #444; padding-bottom:10px;"><b style="color:var(--accent)">${tag}</b>`;
            blocks.forEach(b => {
                const val = plan[`A-${tag}`]?.[b.id] || "";
                html += `<div style="margin-top:8px;"><label>${b.label} (${b.start}-${b.end})</label><input type="text" id="A-${tag}-${b.id}" value="${val}"></div>`;
            });
            html += `</div>`;
        });
        html += `</div><button class="accordion-btn" onclick="toggleAcc('accB')">WOCHE B BEARBEITEN <span>▼</span></button>
            <div id="accB" class="accordion-content">`;
        ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag'].forEach(tag => {
            html += `<div style="margin-top:15px; border-bottom:1px solid #444; padding-bottom:10px;"><b style="color:var(--accent)">${tag}</b>`;
            blocks.forEach(b => {
                const val = plan[`B-${tag}`]?.[b.id] || "";
                html += `<div style="margin-top:8px;"><label>${b.label} (${b.start}-${b.end})</label><input type="text" id="B-${tag}-${b.id}" value="${val}"></div>`;
            });
            html += `</div>`;
        });
        html += `</div><div class="manual-box" style="border-color:var(--success); margin-top:20px;"><label style="color:var(--success)">📊 EXPORT</label><button class="btn btn-start" style="font-size:0.8rem; padding:8px; background:var(--success);" onclick="exportData()">📥 EXPORT FÜR EXCEL / NUMBERS</button></div>`;
        document.getElementById('modal-body').innerHTML = html;
        document.getElementById('modal').style.display = 'block';
    }

    function toggleAcc(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
    function processManual() {
        const d = document.getElementById('nachtrag-date').value, c = document.getElementById('nachtrag-cat').value;
        const s = document.getElementById('nachtrag-start').value, e = document.getElementById('nachtrag-end').value;
        const d1 = new Date("2000-01-01T" + s), d2 = new Date("2000-01-01T" + e);
        saveToDB(c, d1.getTime(), d2.getTime(), d); alert("Gespeichert!"); location.reload();
    }
    function resetToday() {
        if(confirm("Heute löschen?")) {
            const today = new Date().toLocaleDateString('de-DE');
            db = db.filter(e => e.datum !== today); localStorage.setItem('lehrerDB_Export', JSON.stringify(db));
            localStorage.removeItem('activeSessionV13'); logs = []; localStorage.setItem('dailyLogsV13', JSON.stringify(logs));
            location.reload();
        }
    }
    function saveSetup() {
        userName = document.getElementById('setup-name').value;
        weeklySollHours = document.getElementById('setup-soll').value;
        ['A','B'].forEach(w => {
            ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag'].forEach(tag => {
                if(!plan[`${w}-${tag}`]) plan[`${w}-${tag}`] = {};
                blocks.forEach(b => { plan[`${w}-${tag}`][b.id] = document.getElementById(`${w}-${tag}-${b.id}`).value; });
            });
        });
        localStorage.setItem('userNameV13', userName); localStorage.setItem('weeklySollV13', weeklySollHours);
        localStorage.setItem('lehrerPlanV13', JSON.stringify(plan)); location.reload();
    }

    function openHelp() {
        document.getElementById('modal-body').innerHTML = `
            <div class="modal-nav"><button onclick="document.getElementById('modal').style.display='none'" style="background:none; border:none; color:var(--primary); font-weight:bold; cursor:pointer;">✕ SCHLIESSEN</button><b style="color:var(--primary)">BEDIENUNGSANLEITUNG</b><div></div></div>
            <div class="help-text" style="padding: 10px 20px 40px 20px;">
                <p>Willkommen bei deiner Arbeitszeiterfassung. Hier erfährst du alles Wichtige:</p>
                <h3>1. Installation & Start</h3><p>Nutze "Zum Home-Bildschirm hinzufügen" in Safari (iPhone) oder Chrome (Android) für echtes App-Feeling.</p>
                <h3>2. Setup & Plan</h3><p>Trage in den Einstellungen deinen Namen, dein Wochen-Soll (z.B. 26 Std) und deinen Stundenplan ein. Nutze das Akkordeon (Woche A/B) für mehr Übersicht.</p>
                <h3>3. Dienst-Alltag</h3><p>Buttons für Vertretung & Konferenz müssen zur Sicherheit 2x getippt werden. Laufende Zeiten werden direkt auf den Buttons angezeigt.</p>
                <h3>4. Statistik-Balken</h3><p><b>Tag-Fortschritt:</b> Zeigt an, wie viel deiner geplanten Zeit heute bereits vergangen ist.<br><b>Wochen-Gesamt:</b> Rechnet alle Stunden seit Montag zusammen. Ab 100% färbt sich der Balken orange für Überstunden.</p>
                <h3>5. Export & Nachtrag</h3><p>Daten können jederzeit als CSV für Excel/Numbers exportiert werden. Nachträge für die letzten 7 Tage sind manuell möglich.</p>
                <h3>6. Reset</h3><p>Die Historie löscht sich jede Nacht um 00:00 Uhr automatisch.</p>
            </div>`;
        document.getElementById('modal').style.display = 'block';
    }

    function addLog(m) { logs.unshift({ t: new Date().toLocaleTimeString().substr(0,5), m }); if(logs.length > 5) logs.pop(); localStorage.setItem('dailyLogsV13', JSON.stringify(logs)); renderLogs(); }
    function renderLogs() { document.getElementById('log-container').innerHTML = logs.map(l => `<div class="log-entry"><span>${l.m}</span><span>${l.t}</span></div>`).join(''); }
    function toggleWeekManual() { currentWeek = (currentWeek === 'A' ? 'B' : 'A'); localStorage.setItem('manualWeekV13', currentWeek); updateUI(); }
    function exportData() {
        let csv = "\ufeffDatum;Kategorie;Beginn;Ende;Dauer\n";
        db.forEach(e => { csv += `${e.datum};${e.typ};${e.start};${e.ende};${e.dauer}\n`; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
        link.download = "Arbeitszeiten.csv"; link.click();
    }
    function updateAssistant() {
        const now = new Date(), currentTime = now.getHours() * 60 + now.getMinutes();
        const tag = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'][now.getDay()];
        const key = `${currentWeek}-${tag}`;
        let found = false;
        for (let b of blocks) {
            const [hE, mE] = b.end.split(':').map(Number);
            if (currentTime < (hE * 60 + mE)) {
                const text = plan[key]?.[b.id];
                if (text && text.trim() !== "") {
                    document.getElementById('task-status').innerText = "AKTUELL / NÄCHSTES";
                    document.getElementById('task-title').innerText = text;
                    document.getElementById('task-details').innerText = `${b.label}: ${b.start} - ${b.end}`;
                    found = true; break;
                }
            }
        }
        if(!found) { document.getElementById('task-status').innerText = "Bereit"; document.getElementById('task-title').innerText = "Keine weiteren Termine"; }
    }
    window.onload = updateUI;
</script>
</body>
</html>
