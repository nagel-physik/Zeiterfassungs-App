<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arbeitszeit-Assistent Pro v16.7</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2693/2693507.png">
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --accent: #fbbf24; 
            --danger: #ef4444; --text: #ffffff; --success: #10b981; 
            --weekA: #2563eb; --weekB: #9333ea; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { width: 100%; max-width: 420px; box-sizing: border-box; }
        .app-header { width: 100%; text-align: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(56, 189, 248, 0.2); position: relative; }
        .app-header h1 { font-size: 1.3rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); margin: 0; }
        .help-container { position: absolute; right: 0; top: 0; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .help-label { font-size: 0.7rem; color: var(--primary); font-weight: bold; opacity: 0.8; }
        .help-trigger { background: var(--primary); color: var(--bg); width: 22px; height: 22px; border-radius: 50%; font-weight: bold; font-size: 0.85rem; border: none; display: flex; align-items: center; justify-content: center; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.4); text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .next-info { background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 18px; padding: 15px; text-align: left; margin-bottom: 12px; border-left: 5px solid var(--primary); }
        .timer-display { font-size: 2.6rem; font-weight: 800; margin: 5px 0; color: var(--text); font-variant-numeric: tabular-nums; }
        .btn { border: none; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; margin-bottom: 10px; cursor: pointer; color: white; transition: 0.2s; font-size: 1rem; }
        .btn-start { background: var(--success); }
        .btn-stop { background: var(--danger) !important; }
        .btn-setup { background: #475569; }
        .btn-refresh { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
        .btn-extra { background: rgba(56, 189, 248, 0.15); color: var(--primary); border: 1px solid var(--primary); }
        .btn-vz { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid var(--danger); }
        .btn-confirm { background: var(--accent) !important; color: var(--bg) !important; animation: pulse-confirm 0.5s infinite; }
        @keyframes pulse-confirm { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
        .btn-vz.active { background: var(--danger); color: white; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: #94a3b8; margin-bottom: 4px; font-weight: 600; }
        .progress-bar { height: 10px; background: #020617; border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
        .progress-fill { height: 100%; width: 0%; transition: width 1s ease-in-out; }
        #log-container { max-height: 100px; overflow-y: auto; margin-top: 10px; scrollbar-width: none; width: 100%; }
        .log-entry { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.8rem; display: flex; justify-content: space-between; color: #94a3b8; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; padding: 0; }
        .modal-content { background: var(--card); min-height: 100vh; padding: 70px 20px 40px 20px; box-sizing: border-box; }
        .modal-nav { position: fixed; top: 0; left: 0; right: 0; background: var(--card); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--primary); z-index: 1001; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .nav-btn { background: none; border: none; font-size: 0.9rem; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .help-text { text-align: left; font-size: 0.85rem; line-height: 1.5; color: #cbd5e1; }
        .help-text h2 { color: var(--primary); border-bottom: 1px solid var(--primary); padding-bottom: 5px; margin-top: 25px; }
        .help-text h3 { color: var(--accent); margin-top: 20px; margin-bottom: 5px; font-size: 1rem; }
        .help-text b { color: #ffffff; }
        input, select { background: #0f172a; border: 1px solid var(--primary); color: white; padding: 12px; border-radius: 10px; width: 100%; margin: 5px 0 15px 0; box-sizing: border-box; font-size: 1rem; }
        label { font-size: 0.75rem; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        .manual-box { background: rgba(56, 189, 248, 0.1); border: 1px solid var(--primary); padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: left; }
        .footer-info { margin-top: 25px; font-size: 0.65rem; color: #475569; text-align: center; width: 100%; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <header class="app-header">
        <h1>Zeiterfassung</h1>
        <div class="help-container" onclick="openHelp()">
            <span class="help-label">Hilfe</span>
            <button class="help-trigger">?</button>
        </div>
    </header>

    <div style="display:flex; justify-content:space-between; width:100%; font-size:0.9rem; margin-bottom:10px; font-weight:bold; color:var(--primary);">
        <span id="live-clock">--:--:--</span>
        <span id="live-date">--.--.----</span>
    </div>

    <div class="next-info" id="task-card">
        <div style="font-size: 0.65rem; color: var(--accent); font-weight: 800; text-transform: uppercase;" id="task-status">Bereit</div>
        <div style="font-size: 1.2rem; font-weight: 700; margin: 2px 0;" id="task-title">Dienst Starten?</div>
        <div style="font-size: 0.85rem; color: #cbd5e1;" id="task-details">Guten Tag!</div>
        <div id="task-note" style="margin-top: 8px; padding: 6px; background: rgba(16, 185, 129, 0.15); border-radius: 8px; font-size: 0.8rem; color: var(--success); display: none; border: 1px solid var(--success);"></div>
    </div>

    <div class="card">
        <div id="display-name" style="font-size: 0.85rem; color: var(--accent); font-weight: bold; margin-bottom: 8px; letter-spacing: 1px;">LEHRKRAFT</div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <button id="week-btn" style="border:none; padding:8px 18px; border-radius:10px; color:white; font-weight:bold; cursor:pointer;" onclick="toggleWeekManual()">Woche <span id="week-label">A</span></button>
            <div style="font-size: 0.8rem; font-weight: bold; color: #94a3b8;">Ziel: <span id="soll-info" style="color:white;">26</span> Std/Wo</div>
        </div>
        <div id="main-timer" class="timer-display">00:00:00</div>
        <button id="btn-main" class="btn btn-start" onclick="toggleMain()">Dienst starten</button>
        <button id="btn-vz" class="btn btn-vz" onclick="handleVZClick()">+ Vertretung (90m)</button>
        <button id="btn-extra" class="btn btn-extra" onclick="handleExtraClick()">Konferenz / Termin</button>
        <div class="progress-container" style="margin-top: 20px;">
            <div class="progress-label"><span>Tag Unterricht (Soll)</span><span id="day-percent">0%</span></div>
            <div class="progress-bar"><div id="day-progress" class="progress-fill" style="background: var(--accent);"></div></div>
            <div class="progress-label"><span>Vertretungen (Monat)</span><span id="vz-val">0</span></div>
            <div class="progress-bar"><div id="vz-progress" class="progress-fill" style="background: var(--danger);"></div></div>
            <div class="progress-label"><span>Wochenziel (Gesamt)</span><span id="week-percent">0%</span></div>
            <div class="progress-bar"><div id="week-progress" class="progress-fill" style="background: var(--success);"></div></div>
        </div>
    </div>

    <div id="log-container"></div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top: 15px;">
        <button class="btn btn-setup" onclick="openSetup()">⚙️ Einstellungen</button>
        <button class="btn btn-refresh" onclick="location.reload()">🔄 Refresh</button>
    </div>

    <footer class="footer-info">
        &copy; 2026 Michael Nagel &bull; v16.7
    </footer>
</div>

<div id="modal"><div class="modal-content" id="modal-body"></div></div>
<datalist id="suggestions"></datalist>

<script>
    let db = JSON.parse(localStorage.getItem('lehrerDB_Export')) || [];
    let plan = JSON.parse(localStorage.getItem('lehrerPlanV13')) || {};
    let session = JSON.parse(localStorage.getItem('activeSessionV13')) || { active: false };
    let extraSession = JSON.parse(localStorage.getItem('extraSessionV13')) || { active: false };
    let vzSession = JSON.parse(localStorage.getItem('vzSessionV13')) || { active: false };
    let logs = JSON.parse(localStorage.getItem('dailyLogsV13')) || [];
    let currentWeek = localStorage.getItem('manualWeekV13') || 'A';
    let weeklySollHours = localStorage.getItem('weeklySollV13') || 26;
    let userName = localStorage.getItem('userNameV13') || 'Lehrkraft';
    let vocabulary = JSON.parse(localStorage.getItem('lehrerVocabV13')) || [];
    let mainInterval, vzWatcherInterval;
    let confirmVZ = false, confirmExtra = false;

    const blocks = [
        { id: 'b1', start: '07:30', end: '09:00', label: '1. Block', type: 'lesson' },
        { id: 'a1', start: '09:00', end: '09:30', label: '1. Aufsicht', type: 'duty' },
        { id: 'b2', start: '09:30', end: '11:00', label: '2. Block', type: 'lesson' },
        { id: 'a2', start: '11:00', end: '11:30', label: '2. Aufsicht', type: 'duty' },
        { id: 'b3', start: '11:30', end: '13:00', label: '3. Block', type: 'lesson' },
        { id: 'a3', start: '13:00', end: '13:45', label: '3. Aufsicht', type: 'duty' },
        { id: 'b4', start: '13:45', end: '15:15', label: '4. Block', type: 'lesson' },
        { id: 'a4', start: '15:15', end: '15:30', label: '4. Aufsicht', type: 'duty' }
    ];

    const todayStr = new Date().toDateString();
    const storedLogDate = localStorage.getItem('logDateV13');
    if(storedLogDate !== todayStr) { 
        logs = []; 
        localStorage.setItem('dailyLogsV13', JSON.stringify(logs)); 
        localStorage.setItem('logDateV13', todayStr); 
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString();
        document.getElementById('live-date').innerText = now.toLocaleDateString();
        if (session.active) updateAssistant();
    }, 1000);

    function toggleMain() {
        if (!session.active) {
            session = { active: true, start: Date.now(), day: new Date().toDateString() };
            localStorage.setItem('activeSessionV13', JSON.stringify(session));
            addLog("Ankunft"); updateUI();
        } else {
            if(confirm("Dienst beenden?")) {
                const elapsed = (Date.now() - session.start) / 1000;
                if(elapsed < 30) {
                    if(confirm("Eintrag ist kürzer als 30 Sek. NICHT speichern?")) { session.active = false; localStorage.removeItem('activeSessionV13'); location.reload(); return; }
                }
                saveToDB('Hauptdienst', session.start, Date.now());
                addLog("Feierabend");
                session.active = false; localStorage.removeItem('activeSessionV13'); location.reload();
            }
        }
    }

    function handleVZClick() {
        if(vzSession.active) {
            if(confirm("Vertretung vorzeitig beenden?")) {
                const elapsed = (Date.now() - vzSession.start) / 1000;
                if(elapsed < 30) { if(confirm("Kurze Zeit. Eintrag ignorieren?")) { vzSession.active = false; localStorage.removeItem('vzSessionV13'); location.reload(); return; } }
                stopVZManually();
            }
            return;
        }
        if(!confirmVZ) {
            confirmVZ = true; const btn = document.getElementById('btn-vz');
            btn.innerText = "Sicher? (Hier tippen)"; btn.classList.add('btn-confirm');
            setTimeout(() => { confirmVZ = false; if(!vzSession.active) { btn.innerText = "+ Vertretung (90m)"; btn.classList.remove('btn-confirm'); } }, 3000);
        } else { toggleVZ(); }
    }

    function toggleVZ() {
        vzSession = { active: true, start: Date.now() };
        localStorage.setItem('vzSessionV13', JSON.stringify(vzSession));
        addLog("VZ Start"); startVZWatcher(); updateUI();
    }

    function startVZWatcher() {
        if(vzWatcherInterval) clearInterval(vzWatcherInterval);
        vzWatcherInterval = setInterval(() => {
            if (vzSession.active) {
                const elapsed = Date.now() - vzSession.start;
                if (elapsed >= 90 * 60000) {
                    saveToDB('Vertretung (VZ)', vzSession.start, vzSession.start + 90 * 60000);
                    addLog("VZ Ende (Auto)"); vzSession.active = false; localStorage.removeItem('vzSessionV13'); location.reload();
                }
            }
        }, 5000);
    }

    function stopVZManually() {
        saveToDB('Vertretung (VZ)', vzSession.start, Date.now());
        addLog("VZ Ende"); vzSession.active = false; localStorage.removeItem('vzSessionV13'); location.reload();
    }

    function handleExtraClick() {
        if(extraSession.active) {
            if(confirm("Konferenz/Termin beenden?")) {
                const elapsed = (Date.now() - extraSession.start) / 1000;
                if(elapsed < 30) { if(confirm("Kurze Zeit. Eintrag ignorieren?")) { extraSession.active = false; localStorage.removeItem('extraSessionV13'); location.reload(); return; } }
                saveToDB('Konferenz', extraSession.start, Date.now());
                addLog("Konf. Ende"); extraSession.active = false; localStorage.removeItem('extraSessionV13'); location.reload();
            }
            return;
        }
        if(!confirmExtra) {
            confirmExtra = true; const btn = document.getElementById('btn-extra');
            btn.innerText = "Sicher? (Hier tippen)"; btn.classList.add('btn-confirm');
            setTimeout(() => { confirmExtra = false; if(!extraSession.active) { btn.innerText = "Konferenz / Termin"; btn.classList.remove('btn-confirm'); } }, 3000);
        } else { toggleExtra(); }
    }

    function toggleExtra() {
        extraSession = { active: true, start: Date.now() };
        localStorage.setItem('extraSessionV13', JSON.stringify(extraSession));
        addLog("Konf. Start"); location.reload();
    }

    function saveToDB(typ, start, end) {
        const diff = end - start;
        db.push({
            datum: new Date(start).toLocaleDateString('de-DE'),
            typ: typ,
            start: new Date(start).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}),
            ende: new Date(end).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}),
            dauer: new Date(diff).toISOString().substr(11, 8),
            isVZ: (typ.includes('VZ') ? 'JA' : 'NEIN')
        });
        localStorage.setItem('lehrerDB_Export', JSON.stringify(db));
    }

    function resetToday() {
        if(confirm("ACHTUNG: Alle heutigen Timer und heutigen Excel-Einträge werden gelöscht. Fortfahren?")) {
            const today = new Date().toLocaleDateString('de-DE');
            db = db.filter(e => e.datum !== today);
            localStorage.setItem('lehrerDB_Export', JSON.stringify(db));
            localStorage.removeItem('activeSessionV13');
            localStorage.removeItem('vzSessionV13');
            localStorage.removeItem('extraSessionV13');
            logs = []; localStorage.setItem('dailyLogsV13', JSON.stringify(logs)); location.reload();
        }
    }

    function openHelp() {
        document.getElementById('modal-body').innerHTML = `
            <div class="modal-nav">
                <button class="nav-btn" onclick="document.getElementById('modal').style.display='none'" style="color:var(--primary);">✕ Schließen</button>
                <div style="font-weight:bold; color:var(--primary);">BEDIENUNGSANLEITUNG</div>
                <div></div>
            </div>
            <div class="help-text" style="padding: 10px 20px 40px 20px;">
                <p>Willkommen bei deiner persönlichen Arbeitszeiterfassung. Hier erfährst du alles Wichtige:</p>
                
                <h2>1. Installation & Start</h2>
                <h3>App-Gefühl auf dem Smartphone</h3>
                <p>Öffne die Seite in Safari (iPhone) oder Chrome (Android). Tippe auf das <b>Teilen-Symbol</b> (Quadrat mit Pfeil) und wähle <b>"Zum Home-Bildschirm hinzufügen"</b>. So startest du die App ohne Browser-Leiste.</p>
                
                <h2>2. Die erste Einrichtung (Setup)</h2>
                <h3>Stundenplan hinterlegen</h3>
                <p>Gehe auf <b>⚙️ Einstellungen</b>. Gib deinen Namen und dein Wochen-Soll (z.B. 26 Std.) ein. Trage dann deinen Plan für Woche A und B ein. Ein "Block" entspricht dabei immer <b>90 Minuten</b>.</p>
                
                <h2>3. Der Dienst-Alltag & Sicherheit</h2>
                <h3>Dienst starten/beenden</h3>
                <p>Tippe bei Ankunft auf <b>"Dienst starten"</b>. Der Timer läuft im Hintergrund weiter.</p>
                <h3>Scharfschalten (VZ & Konferenz)</h3>
                <p>Um versehentliche Klicks zu vermeiden, müssen diese Buttons <b>zweimal</b> innerhalb von 3 Sekunden getippt werden. Beim ersten Tippen färbt sich der Button gelb ("Sicher?").</p>
                <h3>Automatischer Log-out (VZ)</h3>
                <p>Eine Vertretung wird automatisch nach <b>90 Minuten</b> beendet und gespeichert, falls du vergisst, sie manuell zu stoppen.</p>
                <h3>Fehlklick-Schutz</h3>
                <p>Einträge, die kürzer als 30 Sekunden laufen, werden beim Stoppen abgefragt. So kannst du versehentliche Timer sofort löschen, damit dein Excel sauber bleibt.</p>
                
                <h2>4. Auswertung & Export</h2>
                <h3>Daten für Excel/Numbers</h3>
                <p>Gehe in die <b>⚙️ Einstellungen</b> und tippe auf <b>📥 EXPORT FÜR EXCEL</b>. Die Datei wird im CSV-Format gespeichert und kann direkt mit Excel oder Numbers geöffnet werden.</p>
                
                <h2>5. Fehler korrigieren</h2>
                <h3>Nachtrag</h3>
                <p>In den Einstellungen kannst du unter <b>"NACHTRAG"</b> Uhrzeiten manuell nachpflegen, falls du das Stempeln vergessen hast.</p>
                
                <h2>6. Automatischer Reset</h2>
                <p>Die Historie (Logs) unter den Buttons löscht sich jede Nacht um 00:00 Uhr von selbst.</p>
            </div>`;
        document.getElementById('modal').style.display = 'block';
    }

    function openSetup() {
        const currentTimeString = new Date().toTimeString().substr(0, 8);
        let html = `
            <div class="modal-nav">
                <button class="nav-btn" onclick="document.getElementById('modal').style.display='none'" style="color:var(--danger);">✕ Abbrechen</button>
                <div style="font-weight:bold; color:var(--primary);">EINSTELLUNGEN</div>
                <button class="nav-btn" onclick="saveAll()" style="color:var(--success);">Speichern ✓</button>
            </div>
            <div class="manual-box" style="border-color:var(--danger); background: rgba(239, 68, 68, 0.05);">
                <label style="color:var(--danger); font-weight:800;">⚠️ TAGES-RESET</label>
                <button class="btn btn-stop" style="font-size:0.85rem; padding:10px;" onclick="resetToday()">HEUTIGEN TAG AUF NULL SETZEN</button>
            </div>
            <div class="manual-box" style="border-color:var(--success);">
                <label style="color:var(--success); font-weight:800;">📊 MONATSEXPORT</label>
                <button class="btn btn-start" style="background:var(--success); font-size:0.85rem;" onclick="exportToExcel()">📥 EXPORT FÜR EXCEL / NUMBERS</button>
            </div>
            <div class="manual-box">
                <label style="color:var(--accent); font-weight:800;">🕒 NACHTRAG</label>
                <select id="nachtrag-cat"><option value="main">HAUPT-DIENST</option><option value="extra">KONFERENZ</option><option value="vz">VERTRETUNG (VZ)</option></select>
                <select id="nachtrag-type"><option value="start">Beginn setzen</option><option value="end">Ende setzen um:</option></select>
                <input type="time" id="nachtrag-time" step="1" value="${currentTimeString}">
                <button class="btn btn-start" style="padding:10px; font-size:0.85rem;" onclick="processNachtrag()">ÜBERNEHMEN</button>
            </div>
            <label>Name</label><input type="text" id="user-input" value="${userName}">
            <label>Wochen-Soll</label>
            <select id="soll-select"><option value="25" ${weeklySollHours==25?'selected':''}>25 Std</option><option value="26" ${weeklySollHours==26?'selected':''}>26 Std</option></select>`;
        ['A','B'].forEach(w => {
            html += `<h3 style="color:var(--primary); margin-top:20px;">WOCHE ${w}</h3>`;
            ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag'].forEach(d => {
                const k = `${w}-${d}`; html += `<div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:12px; margin-top:8px;"><strong>${d}</strong>`;
                blocks.forEach(b => {
                    const entry = plan[k]?.[b.id] || { text: "", note: "" };
                    html += `<div style="margin-top:5px;"><label>${b.label}</label>
                    <input type="text" list="suggestions" placeholder="${b.type==='lesson' ? 'Fach | Klasse | Raum' : 'Ort der Aufsicht...'}" onchange="saveData('${k}','${b.id}','text',this.value)" value="${entry.text}">
                    ${b.type==='lesson' ? `<input type="text" placeholder="Notiz..." onchange="saveData('${k}','${b.id}','note',this.value)" value="${entry.note||''}">` : ''}</div>`;
                }); html += `</div>`;
            });
        });
        document.getElementById('modal-body').innerHTML = html;
        document.getElementById('modal').style.display = 'block';
    }

    function exportToExcel() {
        if (db.length === 0) return alert("Keine Daten!");
        let csv = "\ufeffDatum;Kategorie;Beginn;Ende;Dauer;VZ\n";
        db.forEach(e => { csv += `${e.datum};${e.typ};${e.start};${e.ende};${e.dauer};${e.isVZ || 'NEIN'}\n`; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Zeiten_${userName}.csv`; link.click();
    }

    function updateUI() {
        const btn = document.getElementById('btn-main');
        if (session.active) {
            btn.innerText = "Dienst beenden"; btn.className = "btn btn-stop";
            if (!mainInterval) mainInterval = setInterval(() => {
                const diff = Date.now() - session.start;
                document.getElementById('main-timer').innerText = new Date(diff).toISOString().substr(11, 8);
                updateProgressBar();
            }, 1000);
        } else {
            btn.innerText = "Dienst starten"; btn.className = "btn btn-start";
            if (mainInterval) { clearInterval(mainInterval); mainInterval = null; }
        }
        const vzBtn = document.getElementById('btn-vz');
        if (vzSession.active) { vzBtn.innerText = "Vertretung läuft... (Stoppen?)"; vzBtn.classList.add('active'); vzBtn.classList.remove('btn-confirm'); }
        else { vzBtn.innerText = "+ Vertretung (90m)"; vzBtn.classList.remove('active'); vzBtn.classList.remove('btn-confirm'); }
        
        const extraBtn = document.getElementById('btn-extra');
        if (extraSession.active) { extraBtn.innerText = "Konferenz läuft... (Stoppen?)"; extraBtn.style.background = "var(--danger)"; extraBtn.classList.remove('btn-confirm'); }
        else { extraBtn.innerText = "Konferenz / Termin"; extraBtn.style.background = ""; extraBtn.classList.remove('btn-confirm'); }

        const currentMonth = new Date().getMonth();
        const vzCount = db.filter(e => {
            const dParts = e.datum.split('.');
            return new Date(dParts[2], dParts[1]-1, dParts[0]).getMonth() === currentMonth && e.isVZ === 'JA';
        }).length;
        document.getElementById('vz-val').innerText = vzCount;
        document.getElementById('vz-progress').style.width = Math.min((vzCount / 3) * 100, 100) + "%";
        document.getElementById('week-label').innerText = currentWeek;
        document.getElementById('week-btn').style.background = currentWeek === 'A' ? 'var(--weekA)' : 'var(--weekB)';
        document.getElementById('display-name').innerText = "USER: " + userName.toUpperCase();
        document.getElementById('soll-info').innerText = weeklySollHours;
        renderLogs();
    }

    function saveData(k, id, f, v) { if(!plan[k]) plan[k]={}; if(!plan[k][id]) plan[k][id]={}; plan[k][id][f] = v; if(f==='text' && v.length > 2 && !vocabulary.includes(v)) { vocabulary.push(v); localStorage.setItem('lehrerVocabV13', JSON.stringify(vocabulary)); } }
    function saveAll() { userName = document.getElementById('user-input').value; weeklySollHours = document.getElementById('soll-select').value; localStorage.setItem('userNameV13', userName); localStorage.setItem('weeklySollV13', weeklySollHours); localStorage.setItem('lehrerPlanV13', JSON.stringify(plan)); location.reload(); }
    function toggleWeekManual() { currentWeek = currentWeek === 'A' ? 'B' : 'A'; localStorage.setItem('manualWeekV13', currentWeek); location.reload(); }

    window.onload = () => {
        updateUI();
        if(vzSession.active) {
            const elapsed = Date.now() - vzSession.start;
            if (elapsed >= 90 * 60000) { saveToDB('Vertretung (VZ)', vzSession.start, vzSession.start + 90 * 60000); vzSession.active = false; localStorage.removeItem('vzSessionV13'); updateUI(); }
            else { startVZWatcher(); }
        }
        document.getElementById('suggestions').innerHTML = vocabulary.map(v => `<option value="${v}">`).join('');
    };
</script>
</body>
</html>
